name: CI Mobile

on:
  push:
    branches: [mobile]
  pull_request:
    branches: [mobile]

permissions:
  contents: read

jobs:
  web-shared:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify mobile contains main
        run: |
          git fetch origin main
          git merge-base --is-ancestor origin/main HEAD || {
            echo "mobile branch must include latest main before push";
            echo "main tip: $(git rev-parse --short origin/main)";
            echo "mobile tip: $(git rev-parse --short HEAD)";
            exit 1;
          }

      - name: Typecheck
        run: |
          rm -rf .next
          npx tsc --noEmit

      - name: Build
        run: npm run build

  android-debug:
    runs-on: ubuntu-latest
    needs: web-shared

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Assemble Android Debug
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --stacktrace
